<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas - IMPULSO DIGITAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">

        <!-- ========== SIDEBAR ========== -->
        <aside class="sidebar">
            <div class="sidebar__header">
                <a href="../index.html" class="sidebar__logo">
                    <svg class="sidebar__logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="20" cy="20" r="19" stroke="#38BDF8" stroke-width="2"/>
                        <path d="M12 28L18 20L22 24L28 14" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="28" r="2.5" fill="#38BDF8"/>
                        <circle cx="18" cy="20" r="2.5" fill="#FFFFFF"/>
                        <circle cx="22" cy="24" r="2.5" fill="#38BDF8"/>
                        <circle cx="28" cy="14" r="2.5" fill="#FFFFFF"/>
                        <path d="M28 14L32 10" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <span class="sidebar__brand">Impulso Digital</span>
                </a>
            </div>

            <nav class="sidebar__nav">
                <span class="sidebar__label">Menú</span>
                <ul class="sidebar__list">
                    <li>
                        <a href="dashboard.html" class="sidebar__link">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                            Dashboard
                        </a>
                    </li>
                    <li>
                        <a href="consultas.html" class="sidebar__link sidebar__link--active">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                            Consultas
                        </a>
                    </li>
                    <li>
                        <a href="#" class="sidebar__link">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                            Servicios
                        </a>
                    </li>
                    <li>
                        <a href="#" class="sidebar__link">
                            <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                            Categorías
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar__footer">
                <button id="btnCerrarSesion" class="sidebar__btn-cerrar">
                    <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Cerrar sesión
                </button>
            </div>
        </aside>

        <!-- ========== MAIN CONTENT ========== -->
        <main class="main-content">

            <!-- Header -->
            <header class="topbar">
                <div class="topbar__left">
                    <h1 class="topbar__title">Consultas recibidas</h1>
                    <p class="topbar__subtitle">Listado de mensajes enviados desde el sitio web.</p>
                </div>
                <div class="topbar__right">
                    <span class="topbar__badge">Administrador</span>
                </div>
            </header>

            <!-- Content -->
            <div class="content">

                <!-- Filters -->
                <section class="filters">
                    <div class="filters__group">
                        <label for="filtroEstado" class="filters__label">Filtrar por estado</label>
                        <select id="filtroEstado" class="filters__select">
                            <option value="todas">Todas</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="respondida">Respondida</option>
                            <option value="cancelada">Cancelada</option>
                        </select>
                    </div>
                    <div class="filters__group">
                        <label for="buscadorConsultas" class="filters__label">Buscar</label>
                        <input type="text" id="buscadorConsultas" class="filters__input" placeholder="Buscar por nombre, teléfono o servicio...">
                    </div>
                    <div class="filters__info">
                        <span>Total: <strong id="totalConsultas">0</strong> consultas</span>
                    </div>
                </section>

                <!-- Table -->
                <section class="section-block">
                    <div class="table-wrapper">
                        <table class="table" id="tablaConsultas">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Nombre</th>
                                    <th>Teléfono</th>
                                    <th>Servicio consultado</th>
                                    <th>Mensaje</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaConsultasBody">
                            </tbody>
                        </table>
                    </div>
                </section>

            </div>
        </main>

    </div>

    <script src="../js/consultas.js"></script>
</body>
</html>
