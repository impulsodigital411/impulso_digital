<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - IMPULSO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="login-page">
    <main class="login-shell">
        <div class="login-bg login-bg--one"></div>
        <div class="login-bg login-bg--two"></div>

        <section class="login-card" aria-label="Ingreso al panel administrativo">
            <a href="../index.html" class="login-logo" aria-label="Volver al sitio de Impulso">
                <img src="../imagenes/logo/logo-impulso-completo.png" alt="Impulso" class="login-logo__img">
            </a>

            <div class="login-heading">
                <span class="login-heading__eyebrow">Panel administrativo</span>
                <h1>Acceso privado</h1>
                <p>Ingresá con tu usuario administrador para gestionar consultas y módulos internos.</p>
            </div>

            <form class="login-form" id="loginForm" novalidate>
                <div class="login-field">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" autocomplete="username" placeholder="admin" required>
                </div>

                <div class="login-field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>

                <p class="login-message" id="loginMessage" aria-live="polite"></p>

                <button type="submit" class="login-submit" id="loginSubmit">Iniciar sesión</button>
            </form>

            <a href="../index.html" class="login-back">Volver al inicio</a>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
